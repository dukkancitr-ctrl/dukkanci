<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Alyamama:wght@700&display=swap" rel="stylesheet">
<style>
  @font-face{font-family:'IBM Plex Sans Arabic';src:url('/assets/fonts/IBMPlexSansArabic-Medium.ttf') format('truetype');font-weight:500;font-display:block}
  @font-face{font-family:'IBM Plex Sans Arabic';src:url('/assets/fonts/IBMPlexSansArabic-SemiBold.ttf') format('truetype');font-weight:600;font-display:block}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#222}
  .cover{position:relative;width:1640px;height:608px;overflow:hidden;direction:rtl;
    background:#fdf7f3;
    font-family:'Alyamama','IBM Plex Sans Arabic',Tahoma,sans-serif;
    display:flex;flex-direction:column;align-items:center;justify-content:center}

  .watermark{position:absolute;left:-120px;top:50%;transform:translateY(-50%);
    width:540px;height:540px;opacity:.05}
  .watermark img{width:100%;height:100%;object-fit:contain}
  .topbar{position:absolute;top:0;left:0;width:100%;height:8px;background:#e30613}
  .botbar{position:absolute;bottom:0;left:0;width:100%;height:8px;background:#e30613}

  .logo{position:relative;z-index:2}
  .logo img{height:236px;width:auto;display:block}
  .rule{position:relative;z-index:2;width:96px;height:5px;border-radius:3px;background:#e30613;margin:34px 0 28px}
  .tag{position:relative;z-index:2;font-family:'Alyamama','IBM Plex Sans Arabic',sans-serif;
    font-weight:700;font-size:56px;color:#231f20;letter-spacing:-.5px}

  .foot{position:absolute;z-index:2;bottom:48px;left:0;width:100%;text-align:center;
    font-family:'IBM Plex Sans Arabic',sans-serif;font-weight:500;font-size:26px;color:#8a7f7b}
</style>
</head>
<body>
  <div class="cover">
    <div class="topbar"></div>
    <div class="watermark"><img src="/assets/dukkanci-app-icon-512.png" alt=""></div>

    <div class="logo"><img src="/assets/dukkanci-logo.png" alt="دكانجي"></div>
    <div class="rule"></div>
    <div class="tag">سوق الحيّ بين يديك</div>

    <div class="foot">توصيل سريع من متاجر ومطاعم وبقالات حيّك في إسطنبول</div>
    <div class="botbar"></div>
  </div>
</body>
</html>
